<head>
  <meta charset="utf-8" />
  <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="{{ site.theme_color }}">

  <link rel="canonical" href="{% if page.canonical %}{{ page.canonical | absolute_url }}{% else %}{{ page.url | absolute_url }}{% endif %}">

  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icon/apple-touch-icon.png">

  <meta name="description" content="{{ page.description | default: site.description }}" />

  <meta property="og:title" content="{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}" />
  <meta property="og:description" content="{{ page.description }}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />{% if page.image %}
  <meta property="og:image" content="{{ page.image | prepend: site.url }}" />{% endif %}
  <meta property="og:site_name" content="{{ site.title }}" />
  <meta property="og:locale" content="{{ site.locale }}" />

  {% feed_meta %}

  <link rel="stylesheet" href="{{ site.styles.output }}" />
</head>
